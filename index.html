<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Explorer</title>

    <style>
        /* 🔥 NEW: Global reset + font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #000;
            color: white; /* 🔥 NEW: default text white */
        }

        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* 🔧 adjusted */
            width: 60%;
            margin: 40px auto;
        }

        #inputArea {
            border-radius: 25px;
            padding: 12px 20px; /* 🔥 NEW: better padding */
            border: 2px solid #555; /* 🔥 NEW */
            background: transparent;
            color: white;
            outline: none;
            width: 250px; /* 🔥 NEW: fixed width */
            transition: 0.3s; /* 🔥 NEW */
        }

        /* 🔥 NEW: focus effect */
        #inputArea:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
        }

        button {
            border-radius: 25px;
            padding: 10px 18px;
            cursor: pointer;
            border: 2px solid #555;
            background: transparent;
            color: white;
            transition: 0.3s;
        }

        /* 🔥 NEW: hover effect */
        button:hover {
            background: #00ffcc;
            color: black;
            border-color: #00ffcc;
        }

        section {
            margin: 30px auto;
            width: 60%;
            min-height: 200px; /* 🔥 NEW: flexible height */
            border: 2px solid #444;
            border-radius: 12px;
            padding: 15px; /* 🔥 NEW */
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            text-align: center;
        }

        /* 🔥 NEW: default message style */
        .default-msg {
            color: #aaa;
            font-style: italic;
        }

        /* 🔥 NEW: user card style */
        .user-card {
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
            transition: 0.3s;
        }

        /* 🔥 NEW: hover effect on user */
        .user-card:hover {
            background: #111;
            border-color: #00ffcc;
        }
    </style>
</head>

<body>

    <div class="search-container">
        <input placeholder="Search" id="inputArea">
        <button class="searchBtn">search</button>
    </div>

    <section class="output">
        <p class="default-msg">🔍 Search users to see results</p>
    </section>

    <script>
        let btnClick = document.querySelector(".searchBtn");
        let inputSection = document.querySelector("#inputArea");
        let parentElem = document.querySelector(".output");

        let savedData = [];

        function renderUser(res) {
            let createElem = document.createElement("p");

            // 🔥 NEW: add class for styling
            createElem.classList.add("user-card");

            createElem.innerHTML = `Name : ${res.name} | City : ${res.address.city} | Email : ${res.email}`;
            parentElem.append(createElem);
        }

        async function loadData() {
            try {
                if (savedData.length === 0) {
                    parentElem.innerHTML = "Loading...";
                    let fetchRawData = await fetch("https://jsonplaceholder.typicode.com/users");

                    if (!fetchRawData.ok) {
                        throw new Error("Server Error");
                    }

                    savedData = await fetchRawData.json();
                }

                parentElem.innerHTML = "";

                savedData.forEach((res) => {
                    renderUser(res);
                });

            } catch (err) {
                parentElem.innerHTML = "❌ Failed to load users";
                console.log(err);
            }
        }

        function userData() {
            let userVal = inputSection.value;
            let realData = userVal.toLowerCase().trim();

            parentElem.innerHTML = "";

            if (realData === "") {
                savedData.forEach((res) => {
                    renderUser(res);
                });
            } else {
                let flag = false;

                savedData.forEach((res) => {
                    if (res.name.toLowerCase().includes(realData)) {
                        renderUser(res);
                        flag = true;
                    }
                });

                if (flag === false) {
                    parentElem.innerHTML = "No user Found";
                }
            }
        }

        btnClick.addEventListener("click", async () => {
            await loadData();
            userData();
        });
    </script>

</body>

</html>
